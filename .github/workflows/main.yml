name: Build KernelSU Module

on:
  workflow_dispatch: # 允许你手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有历史提交，确保 npm run package 能正确计算版本号和 commit-count

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build and Package
        run: npm run package

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: joyose-edit-release
          path: release/*.zip
